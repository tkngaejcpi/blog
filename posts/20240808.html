        <hgroup>
          <h1>歌詞中暢遊</h1>
        </hgroup>

        <p>
          歌詞表面的這些文字，我不可能平白無故地聽到就情緒激動，它們始終是要跟我本人產生聯繫，我才能為之觸動。
        </p>

        <p>
          對於詞本身，詞人（可能）有其創作的意圖，但即便如此，我依然可以在由此激發的聯想中暢遊。
        </p>

        <p>
          所以，我看其他人的歌詞解讀（事實上我討厭「解讀」這個說法，像是在給誰悟道似的），不會把它當作教科書，只把它當作除了我以外其他人的聽後感，因為這是屬於其的暢遊。
        </p>

        <p>希望其他人看到我的歌詞胡思亂想亦是如此。</p>
      </article>
